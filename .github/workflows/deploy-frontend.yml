name: Deploy Frontend

on:
  push:
    branches: [ codex-dev-sso ]
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Inject runtime config
        working-directory: frontend
        env:
          BACKEND_API_URL: ${{ secrets.BACKEND_API_URL }}
          ENTRA_TENANT_ID: ${{ secrets.ENTRA_TENANT_ID }}
          ENTRA_UI_CLIENT_ID: ${{ secrets.ENTRA_UI_CLIENT_ID }}
          ENTRA_API_SCOPE: ${{ secrets.ENTRA_API_SCOPE }}
        run: |
          if [ -z "$BACKEND_API_URL" ] || [ -z "$ENTRA_TENANT_ID" ] || [ -z "$ENTRA_UI_CLIENT_ID" ] || [ -z "$ENTRA_API_SCOPE" ]; then
            echo "Missing one or more required secrets: BACKEND_API_URL, ENTRA_TENANT_ID, ENTRA_UI_CLIENT_ID, ENTRA_API_SCOPE"
            exit 1
          fi

          cat > src/assets/runtime-config.json <<EOF
          {
            "backendUrl": "$BACKEND_API_URL",
            "tenantId": "$ENTRA_TENANT_ID",
            "clientId": "$ENTRA_UI_CLIENT_ID",
            "apiScope": "$ENTRA_API_SCOPE"
          }
          EOF

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.FRONTEND_APP_NAME }}
          publish-profile: ${{ secrets.FRONTEND_PUBLISH_PROFILE }}
          package: ./frontend/dist/edf-frontend
