name: Deploy Frontend

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Inject runtime backend URL
        working-directory: frontend
        env:
          BACKEND_API_URL: ${{ secrets.BACKEND_API_URL }}
        run: |
          if [ -z "$BACKEND_API_URL" ]; then
            echo "Missing required secret: BACKEND_API_URL"
            exit 1
          fi

          cat > src/assets/runtime-config.json <<EOF
          {
            "backendUrl": "$BACKEND_API_URL"
          }
          EOF

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.FRONTEND_APP_NAME }}
          publish-profile: ${{ secrets.FRONTEND_PUBLISH_PROFILE }}
          package: ./frontend/dist/edf-frontend
